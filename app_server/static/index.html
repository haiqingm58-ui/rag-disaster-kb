<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - 地质灾害知识图谱与智能问答系统</title>
  <link rel="stylesheet" href="/static/assets/style.css?v=auth-2">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-visual" aria-label="地质灾害行业标准知识图谱概览">
      <img src="/static/assets/login-hero.png" alt="地质灾害行业标准知识图谱数据概览">
    </section>

    <section class="login-panel" aria-label="系统登录">
      <div class="login-brand">
        <span>GeoRisk Knowledge AI</span>
        <h1>地质灾害知识图谱与智能问答系统</h1>
        <p>洪水、山地滑坡、标准图谱、实时事件与专业文档统一检索。</p>
      </div>

      <form id="loginForm" class="login-form">
        <label>
          用户名
          <input id="username" name="username" type="text" autocomplete="username" placeholder="请输入用户名" required>
        </label>
        <label>
          密码
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" required>
        </label>
        <button id="loginSubmit" type="submit" class="login-submit">登录进入系统</button>
        <p id="loginMessage" class="login-message" role="status"></p>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById("loginForm");
    const message = document.getElementById("loginMessage");
    const submit = document.getElementById("loginSubmit");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      if (!username || !password) {
        message.textContent = "请输入用户名和密码。";
        return;
      }

      submit.disabled = true;
      submit.textContent = "正在登录...";
      message.textContent = "";

      try {
        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({username, password})
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.detail || "登录失败，请检查用户名和密码。");
        }
        localStorage.setItem("rag_access_token", data.access_token);
        localStorage.setItem("rag_token_expires_at", String(data.expires_at || ""));
        localStorage.setItem("rag_username", data.user?.username || username);
        localStorage.setItem("rag_user_role", data.user?.role || "admin");
        window.location.href = "/main.html";
      } catch (error) {
        message.textContent = error.message;
      } finally {
        submit.disabled = false;
        submit.textContent = "登录进入系统";
      }
    });
  </script>
</body>
</html>
