    disaster_types: [landslide, debris_flow, collapse, geological_disaster]
    url: http://zygh.changsha.gov.cn
    urls:
      - http://zygh.changsha.gov.cn
      - http://zygh.changsha.gov.cn/zwgk/
      - http://zygh.changsha.gov.cn/zfxxgk/
      - http://zygh.changsha.gov.cn/xxgk/
      - http://zygh.changsha.gov.cn/gzdt/
      - http://zygh.changsha.gov.cn/tzgg/
      - http://zygh.changsha.gov.cn/xwzx/
