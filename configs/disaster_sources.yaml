sources:
  - source_id: hunan_natural_resource
    source_name: 湖南省自然资源厅地质灾害预警
    level: province
    disaster_types: [landslide, debris_flow, collapse, geological_disaster]
    url: http://zrzyt.hunan.gov.cn/zrzyt/xxgk/yjgl/dzzh/index.html
    enabled: true
    fetch_interval_minutes: 60
    parser_type: hunan_natural_resource
    priority: 1
    notes: 重点采集地质灾害气象风险预警、滑坡、泥石流、崩塌相关公开信息。
  - source_id: cma_warning
    source_name: 中央气象台灾害预警
    level: national
    disaster_types: [rainfall, mountain_flood, geological_disaster]
    url: http://www.nmc.cn/publish/country/warning.html
    enabled: true
    fetch_interval_minutes: 15
    parser_type: cma_warning
    priority: 2
    notes: 关注地质灾害气象风险预警、山洪灾害气象预警、暴雨预警。
  - source_id: hunan_water
    source_name: 湖南省水利厅
    level: province
    disaster_types: [flood, mountain_flood, rainfall, water_level, reservoir]
    url: http://slt.hunan.gov.cn
    enabled: true
    fetch_interval_minutes: 60
    parser_type: hunan_water
    priority: 3
    notes: 关注洪水预警、防汛动态、山洪灾害风险预警、水旱灾害防御。
  - source_id: changsha_water
    source_name: 长沙市水利局
